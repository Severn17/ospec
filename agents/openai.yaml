interface:
  display_name: "OSpec"
  short_description: "Inspect, initialize, and operate OSpec projects"
  default_prompt: "Use $ospec to inspect and initialize this directory according to OSpec rules: if the user intent is simply to initialize the project, still run ospec status first, use ospec init for plain initialization, verify the protocol-shell files on disk before declaring success, use explicit knowledge backfill later, do not assume a web template when the project type is unclear, do not create the first change automatically, and use ospec changes status when you need a summary across active changes."
